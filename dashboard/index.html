<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Industrial Safety Intelligence — Live Risk Dashboard</title>
<style>
  :root {
    color-scheme: light;
    --surface-1:   #fcfcfb;
    --page:        #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:    #e1e0d9;
    --baseline:    #c3c2b7;
    --border:      rgba(11,11,11,0.10);
    --status-good:     #0ca30c;
    --status-warning:  #fab219;
    --status-critical: #d03b3b;
    --status-good-bg:     rgba(12,163,12,0.12);
    --status-warning-bg:  rgba(250,178,25,0.16);
    --status-critical-bg: rgba(208,59,59,0.14);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --surface-1:   #1a1a19;
      --page:        #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:    #2c2c2a;
      --baseline:    #383835;
      --border:      rgba(255,255,255,0.10);
      --status-good:     #0ca30c;
      --status-warning:  #fab219;
      --status-critical: #d03b3b;
      --status-good-bg:     rgba(12,163,12,0.18);
      --status-warning-bg:  rgba(250,178,25,0.14);
      --status-critical-bg: rgba(208,59,59,0.20);
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--page);
    color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  #app { display: flex; flex-direction: column; height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-1);
  }
  header h1 { font-size: 16px; font-weight: 600; margin: 0; }
  header .sub { color: var(--text-secondary); font-size: 12px; margin-top: 2px; }
  #conn { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-secondary); }
  #conn .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
  #conn.live .dot { background: var(--status-good); }
  #conn.down .dot { background: var(--status-critical); }

  main {
    flex: 1; display: grid; grid-template-columns: 1fr 380px;
    gap: 1px; background: var(--border); overflow: hidden;
  }
  #plant-col, #side-col { background: var(--page); overflow: hidden; display: flex; flex-direction: column; }
  #plant-wrap { flex: 1; padding: 16px; overflow: auto; }
  #legend { display: flex; gap: 16px; padding: 0 20px 12px; font-size: 12px; color: var(--text-secondary); flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  .zone-rect { cursor: pointer; stroke: var(--border); stroke-width: 1; transition: fill 0.4s ease, stroke 0.4s ease; }
  .zone-rect.selected { stroke: var(--text-primary); stroke-width: 2; }
  .zone-rect.RED { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { filter: none; }
    50% { filter: drop-shadow(0 0 8px var(--status-critical)); }
  }
  .zone-label { font-size: 12px; font-weight: 600; fill: var(--text-primary); pointer-events: none; }
  .zone-sub   { font-size: 10px; fill: var(--text-secondary); pointer-events: none; }
  .zone-score { font-size: 15px; font-weight: 700; pointer-events: none; }
  .zone-band  { font-size: 9px; font-weight: 700; letter-spacing: 0.04em; pointer-events: none; }

  #side-col { border-left: 1px solid var(--border); }
  .panel { border-bottom: 1px solid var(--border); }
  .panel h2 {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-secondary); margin: 0; padding: 12px 16px 8px;
  }
  #zone-detail { padding: 0 16px 16px; font-size: 13px; }
  #zone-detail .zd-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  #zone-detail .zd-hazard { color: var(--text-secondary); font-size: 12px; margin-bottom: 10px; }
  .status-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.03em;
  }
  .status-chip.GREEN  { background: var(--status-good-bg); color: var(--status-good); }
  .status-chip.YELLOW { background: var(--status-warning-bg); color: var(--status-warning); }
  .status-chip.RED    { background: var(--status-critical-bg); color: var(--status-critical); }
  .status-chip .ic { font-size: 12px; }

  .kv-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  .kv-table td { padding: 4px 0; font-size: 12px; border-bottom: 1px solid var(--gridline); }
  .kv-table td:first-child { color: var(--text-secondary); width: 45%; }
  .kv-table td:last-child { text-align: right; font-variant-numeric: tabular-nums; }

  .trigger-list { margin: 10px 0 0; padding: 0; list-style: none; font-size: 12px; }
  .trigger-list li {
    padding: 6px 8px; margin-bottom: 4px; border-radius: 6px;
    background: var(--status-critical-bg); color: var(--text-primary);
    border-left: 3px solid var(--status-critical);
  }
  .permit-chip {
    display: inline-block; font-size: 11px; padding: 2px 8px; margin: 2px 4px 0 0;
    border-radius: 5px; background: var(--gridline); color: var(--text-secondary);
  }

  #alert-feed { flex: 1; overflow-y: auto; padding: 0 16px 16px; }
  .alert-card {
    border: 1px solid var(--border); border-left: 3px solid var(--status-critical);
    border-radius: 8px; padding: 10px 12px; margin-bottom: 10px;
    background: var(--surface-1); font-size: 12px;
  }
  .alert-card .a-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .alert-card .a-zone { font-weight: 700; font-size: 13px; }
  .alert-card .a-time { color: var(--text-muted); font-size: 11px; }
  .alert-card .a-score { color: var(--status-critical); font-weight: 700; }
  .alert-card .a-triggers { color: var(--text-secondary); margin-top: 4px; }
  .alert-card .a-rag {
    margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--gridline);
    color: var(--text-primary);
  }
  .alert-card .a-rag .lbl { color: var(--text-secondary); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
  .alert-card .a-pending { color: var(--text-muted); font-style: italic; margin-top: 6px; }
  #alert-empty { color: var(--text-muted); font-size: 12px; padding: 12px 0; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>Industrial Safety Intelligence</h1>
      <div class="sub">Live compound-risk view — 8 zones</div>
    </div>
    <div id="conn"><span class="dot"></span><span id="conn-label">connecting…</span></div>
  </header>

  <div id="legend">
    <span class="legend-item"><span class="legend-dot" style="background: var(--status-good)"></span>Green — normal</span>
    <span class="legend-item"><span class="legend-dot" style="background: var(--status-warning)"></span>Yellow — elevated</span>
    <span class="legend-item"><span class="legend-dot" style="background: var(--status-critical)"></span>Red — compound risk</span>
  </div>

  <main>
    <div id="plant-col">
      <div id="plant-wrap">
        <svg id="plant-svg" viewBox="0 0 900 520" width="100%" height="100%" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </div>
    <div id="side-col">
      <div class="panel">
        <h2>Zone Detail</h2>
        <div id="zone-detail"><div id="alert-empty">Select a zone…</div></div>
      </div>
      <div class="panel" style="display:flex; flex-direction:column; flex:1; min-height:0;">
        <h2>Alert Feed</h2>
        <div id="alert-feed"><div id="alert-empty">No RED alerts yet.</div></div>
      </div>
    </div>
  </main>
</div>
<script src="app.js"></script>
</body>
</html>
